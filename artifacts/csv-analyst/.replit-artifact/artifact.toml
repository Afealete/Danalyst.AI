kind = "web"
previewPath = "/"
title = "CSV Data Analyst"
version = "1.0.0"
id = "artifacts/csv-analyst"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18996

[services.development]
run = "pnpm --filter @workspace/csv-analyst run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/csv-analyst", "run", "build" ]
publicDir = "artifacts/csv-analyst/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18996"
BASE_PATH = "/"
